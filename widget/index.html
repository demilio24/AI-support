<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nils Platform Widget Test</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        h1 {
            color: #333;
        }
        .container {
            max-width: 800px;
            text-align: center;
            background: white;
            padding: 2rem;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        p {
            color: #666;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Widget Test Page</h1>
        <p>This is a blank test page to demonstrate the Nils Platform chat widget.</p>
        <p>Look for the chat bubble icon in the bottom right corner of the screen. Click it to interact with the widget loaded from <code>widget.js</code>.</p>
    </div>

    <!-- Inject the widget script here -->
    <script src="widget.js"></script>
</body>
</html>
